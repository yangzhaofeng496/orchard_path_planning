# ============================================================================
# RRT* 路径规划实验配置文件
# ============================================================================

# ----------------------------------------------------------------------------
# 环境配置
# ----------------------------------------------------------------------------
environment:
  # 环境类型：
  #   - simple: 简单随机环境
  #   - complex: 复杂随机环境（更多障碍物）
  #   - hybrid_single_blocker: 单圆封锁目标直线
  #   - hybrid_staggered_trees: 交错圆形果树连续绕行
  #   - hybrid_row_corridor: 果树行间窄通道与局部阻挡
  #   - density_<数量>_<种子>: 固定密度环境（如 density_20_0）
  #   - overlap_<百分比>_<种子>: 固定重叠率环境（如 overlap_50_0）
  #   - gap_<宽度>_<种子>: 窄通道环境（如 gap_4.5_0）
  env_type: "hybrid_staggered_trees"

  # 环境文件路径（留空则自动生成）
  environment_path: null

  # 动态采样矩形尺寸（米）
  rectangle:
    length: 30.0  # 矩形长度（朝向目标方向）
    width: 12.0   # 矩形宽度（垂直于目标方向）

# ----------------------------------------------------------------------------
# 规划器配置
# ----------------------------------------------------------------------------
planner:
  # 规划方法列表：["RRT*", "GoalBias", "Hybrid"]
  methods: ["GoalBias", "Hybrid"]

  # 最大迭代次数
  max_iterations: 3000

  # 是否允许倒车
  allow_reverse: true

  # 扩展步长（米）
  expand_length: 3.0

  # 路径采样步长（米）
  step_size: 0.02

  # 近邻半径（米）
  near_radius: 5.0

# ----------------------------------------------------------------------------
# 车辆参数
# ----------------------------------------------------------------------------
vehicle:
  # 轮距（米）
  wheel_base: 2.5

  # 最大转向角（度）
  max_steer_deg: 30.0

  # 车辆几何尺寸
  geometry:
    front_length: 3.0   # 前悬长度（米）
    rear_length: 1.0    # 后悬长度（米）
    width: 1.6          # 车辆宽度（米）
    safety_margin: 0.15 # 安全余量（米）

# ----------------------------------------------------------------------------
# 混合采样配置
# ----------------------------------------------------------------------------
sampling:
  # 矩形缩小概率（0.0-1.0）
  shrink_probability: 0.60

  # 矩形缩小因子
  shrink_length_factor: 0.90  # 长度缩小到原来的 90%
  shrink_width_factor: 0.65   # 宽度缩小到原来的 65%

  # 激活缩小的距离阈值（米）
  # 当树末端距离目标小于此值时，开始缩小矩形
  shrink_activation_distance: 20.0

  # 锚点附近采样概率（0.0-1.0）
  near_anchor_probability: 0.60

  # 锚点附近采样长度比例（0.0-1.0）
  # 在矩形长度的这个比例范围内采样
  near_anchor_length_ratio: 0.40

# ----------------------------------------------------------------------------
# 路径优化配置 (Path Shortcut Optimizer)
# ----------------------------------------------------------------------------
path_optimization:
  # 是否启用路径优化
  enabled: true

  # 随机捷径最大迭代次数
  # 值越大，优化效果越好，但耗时更长
  # 推荐范围：50-200
  max_iterations: 100

  # 最小点间距（米）
  # 小于此距离的相邻点会被删除
  # 推荐范围：0.05-0.5（取决于车辆尺寸）
  min_points_distance: 0.2

  # 是否启用共线点过滤
  enable_angle_filter: true

  # 共线判定角度阈值（度）
  # 小于此角度的三点会被认为共线，中间点会被删除
  # 推荐范围：5-20 度
  angle_threshold: 15.0

  # 随机种子（用于结果可复现）
  # 设置为 null 则每次结果不同
  random_seed: 42

  # 是否打印详细优化信息
  verbose: true

  # 碰撞检测分辨率（米）
  # 检查捷径路径时的采样间隔
  collision_check_resolution: 0.1

# ----------------------------------------------------------------------------
# 可视化配置
# ----------------------------------------------------------------------------
visualization:
  # 是否启用实时可视化
  enabled: true

  # 是否保存图表
  save_figures: false

  # 可视化更新间隔（迭代次数）
  # 每隔多少次迭代更新一次可视化
  # 值越小，更新越频繁，但可能影响性能
  visualization_interval: 5

  # 刷新暂停时间（秒）
  # 每次更新后的暂停时间，用于控制动画速度
  refresh_pause: 0.001

# ----------------------------------------------------------------------------
# 实验配置
# ----------------------------------------------------------------------------
experiment:
  # 试验次数
  # 用于统计平均性能
  trials: 1

  # 随机种子
  seed: 0
