# ============================================================================
# DWA (Dynamic Window Approach) 局部规划器配置
# ============================================================================

dwa:
  # ----------------------------------------------------------------------------
  # 车辆参数
  # ----------------------------------------------------------------------------
  # 轮距（米）
  wheel_base: 2.5

  # 最大速度（m/s）
  max_speed: 2.0

  # 最大加速度（m/s²）
  max_accel: 1.0

  # 最大减速度（m/s²）
  max_decel: 1.0

  # 最大转向角（度）
  max_steer_deg: 30.0

  # 最大转向角速度（度/秒）
  max_steer_rate_deg: 70.0

  # ----------------------------------------------------------------------------
  # 控制参数
  # ----------------------------------------------------------------------------
  # 控制周期（秒）
  dt: 0.1

  # 预测时间范围（秒）
  predict_time: 3.0

  # 前瞻距离（米）
  lookahead_distance: 3.0

  # 目标容忍距离（米）
  goal_tolerance: 0.5

  # ----------------------------------------------------------------------------
  # 采样参数
  # ----------------------------------------------------------------------------
  # 速度采样点数
  speed_samples: 5

  # 转向角采样点数
  steer_samples: 15

  # ----------------------------------------------------------------------------
  # 车辆几何尺寸
  # ----------------------------------------------------------------------------
  # 车辆前悬（米）
  vehicle_front_length: 3.0

  # 车辆后悬（米）
  vehicle_rear_length: 1.0

  # 车辆宽度（米）
  vehicle_width: 1.6

  # 车辆安全边距（米）
  vehicle_safety_margin: 0.2

  # ----------------------------------------------------------------------------
  # 代价函数权重
  # ----------------------------------------------------------------------------
  # 目标距离权重
  goal_cost_weight: 1.0

  # 障碍物权重
  obstacle_cost_weight: 2.0

  # 速度权重
  speed_cost_weight: 0.5

  # 路径跟踪权重
  path_cost_weight: 1.0

  # 航向误差权重
  heading_cost_weight: 0.8

  # 转向幅度权重
  steering_cost_weight: 0.2

  # 转向变化平滑权重
  steering_change_cost_weight: 0.1

  # 沿全局路径前进的奖励权重
  progress_reward_weight: 0.04

  # ----------------------------------------------------------------------------
  # 障碍物安全参数
  # ----------------------------------------------------------------------------
  # 最小安全距离（米）
  obstacle_min_dist: 1.5

  # 障碍物影响范围（米）
  obstacle_influence_dist: 3.0
