# ============================================================================
# TEB (Timed Elastic Band) 局部规划器配置
# ============================================================================

teb:
  # ----------------------------------------------------------------------------
  # 车辆参数
  # ----------------------------------------------------------------------------
  # 轮距（米）
  wheel_base: 2.5

  # 最大速度（m/s）
  max_speed: 2.0

  # 最大加速度（m/s²）
  max_accel: 1.0

  # 最大转向角（度）
  max_steer_deg: 30.0

  # ----------------------------------------------------------------------------
  # 优化参数
  # ----------------------------------------------------------------------------
  # 控制周期（秒）
  dt: 0.1

  # TEB 节点采样数量
  num_samples: 15

  # 最大优化迭代次数
  max_iterations: 100

  # 目标容忍距离（米）
  goal_tolerance: 0.5

  # ----------------------------------------------------------------------------
  # 车辆几何尺寸
  # ----------------------------------------------------------------------------
  # 车辆前悬（米）
  vehicle_front_length: 1.2

  # 车辆后悬（米）
  vehicle_rear_length: 0.5

  # 车辆宽度（米）
  vehicle_width: 1.0

  # 车辆安全边距（米）
  vehicle_safety_margin: 0.1

  # ----------------------------------------------------------------------------
  # 优化权重
  # ----------------------------------------------------------------------------
  # 时间最优权重（鼓励更快完成）
  w_time: 1.0

  # 障碍物代价权重（惩罚靠近障碍物）
  w_obstacle: 50.0

  # 运动学约束权重（Ackermann 模型约束）
  w_kinematics: 20.0

  # 加速度平滑权重（减少加速度变化）
  w_acceleration: 5.0

  # 角速度约束权重
  w_omega: 10.0

  # 路径跟踪权重（鼓励靠近全局路径）
  w_path: 1.0

  # ----------------------------------------------------------------------------
  # 障碍物安全参数
  # ----------------------------------------------------------------------------
  # 最小安全距离（米）
  # 小于此距离会受到大惩罚
  obstacle_min_dist: 0.5

  # 障碍物影响范围（米）
  # 在此范围内会受到小惩罚
  obstacle_influence_dist: 2.0
