# ============================================================================
# TEB 交互式演示配置（性能优化版）
# ============================================================================

teb:
  # ----------------------------------------------------------------------------
  # 车辆参数
  # ----------------------------------------------------------------------------
  wheel_base: 2.5
  max_speed: 2.0
  max_accel: 1.5
  max_steer_deg: 30.0

  # ----------------------------------------------------------------------------
  # 优化参数（性能优化）
  # ----------------------------------------------------------------------------
  dt: 0.15  # 增大时间步长，减少节点数

  # 减少节点数量（从 20 降到 15）
  num_samples: 15

  # 减少最大迭代次数（从 100 降到 60）
  max_iterations: 100

  goal_tolerance: 0.5

  # ----------------------------------------------------------------------------
  # 车辆几何尺寸
  # ----------------------------------------------------------------------------
  vehicle_front_length: 1.2
  vehicle_rear_length: 0.5
  vehicle_width: 1.0
  vehicle_safety_margin: 0.1

  # ----------------------------------------------------------------------------
  # 优化权重
  # ----------------------------------------------------------------------------
  w_time: 1.0
  w_obstacle: 20.0
  w_kinematics: 20.0
  w_acceleration: 5.0
  w_omega: 10.0
  w_path: 1.0

  # ----------------------------------------------------------------------------
  # 障碍物安全参数
  # ----------------------------------------------------------------------------
  obstacle_min_dist: 0.5
  obstacle_influence_dist: 2.0

  # ----------------------------------------------------------------------------
  # 性能优化参数
  # ----------------------------------------------------------------------------
  # 增大碰撞检查分辨率（减少采样点）
  collision_check_resolution: 0.15  # 从 0.10 增加到 0.15（平衡性能和精度）

  # 前瞻距离
  lookahead_distance: 10.0

  # ----------------------------------------------------------------------------
  # 调试参数
  # ----------------------------------------------------------------------------
  debug_log: true  # 启用详细的计时日志
  log_interval: 1  # 每次规划都输出日志
