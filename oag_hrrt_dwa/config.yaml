# ============================================================================
# OAG-HRRT*-DWA 配置文件
# ============================================================================

# ----------------------------------------------------------------------------
# 环境配置
# ----------------------------------------------------------------------------
environment:
  # 环境地图文件路径
  map_path: "./orchard_complex.npz"

  # 环境生成参数
  generation:
    # 随机种子
    seed: 42

    # 栅格大小
    grid_size: 150

    # 栅格单元对应的实际距离（米）
    cell_size: 1.0

    # 障碍物配置
    obstacles:
      # 障碍物数量
      count: 50

      # 障碍物生成范围（栅格单元）
      margin: 5  # 距离边界的最小距离

      # 障碍物大小范围（栅格单元）
      min_size: 1
      max_size: 10

      # 障碍物半径安全边距系数
      safety_margin: 0.4  # 原来是 0.7

    # 起点和目标点配置（栅格坐标，null表示自动计算）
    start:
      x: null  # null = grid_size // 2
      y: 5

    goal:
      x: null  # null = grid_size // 2
      y: null  # null = grid_size - 5

# 固定起点/终点位姿。单位：x/y 为米，yaw_deg 为度。
# 取消注释并填写后，程序启动即自动规划；也可用 --start-pose/--goal-pose 覆盖。
poses:
  start: null  # 例如: {x: 2.6, y: 5.0, yaw_deg: 90.0}
  goal: null   # 例如: {x: 10.0, y: 15.0, yaw_deg: 90.0}

# ----------------------------------------------------------------------------
# RRT* 规划器配置
# ----------------------------------------------------------------------------
planner:
  # true: 使用 Dubins/Reeds-Shepp 阿克曼曲率约束连接
  # false: 使用经典 RRT* 直线连接，不限制最小转弯半径
  use_ackermann_constraints: false

  # 目标偏置采样概率，独立于阿克曼约束开关
  # 0.0 表示关闭；0.20 表示约 20% 的采样直接偏向目标
  goal_probability: 0.20

  # 障碍物阻挡目标方向时，采样其切向绕障目标的概率
  # 0.0 表示关闭切向目标采样
  tangent_probability: 0.10

  # false: 严格使用上述固定概率；true: 随迭代阶段自动调整采样概率
  adaptive_sampling_probabilities: false

  # 最大迭代次数
  max_iterations: 2500

  # 动态采样矩形尺寸（米）
  rectangle:
    length: 22.0
    width: 16.0

  # 平滑迭代次数
  # 简化模式：投影通道连接后不再执行 Chaikin 平滑
  smoothing_iterations: 0

  # 是否使用目标连接器（goal connector）
  # true: 在接近目标时尝试直接连接，加快收敛
  # false: 完全依赖随机采样，更适合复杂环境
  use_goal_connector: true

  # 是否允许倒车（局部连接器类型）
  # true: 使用 Reeds-Shepp 曲线（可前进+倒车，路径更短）
  # false: 使用 Dubins 曲线（仅前进，适合农机）
  allow_reverse: true

# ----------------------------------------------------------------------------
# 车辆参数
# ----------------------------------------------------------------------------
vehicle:
  # 轮距（米）
  wheel_base: 0.9

  # 全局规划、通道对齐和局部控制统一使用该最小转弯半径
  min_turning_radius: 3.0

  # 最大转向角（度）
  max_steer_deg: 16.70

  # 车辆几何尺寸
  geometry:
    front_length: 1.25
    rear_length: 0.35
    width: 0.8
    safety_margin: 0.18

# ----------------------------------------------------------------------------
# 两圆通道提前对齐（投影方法）
# ----------------------------------------------------------------------------
corridor_alignment:
  enabled: false

  # 候选必须能容纳车身、净宽不超过车宽的指定倍数，并且路径真实
  # 穿过两圆门线；不再限制门线交点到通道中心的距离。
  search:
    max_gap_width_factor: 6.0

  # 投影方法参数
  projection:
    use_projection_method: true        # 使用基于最大直径投影的方法
    connect_only: true                 # 仅直连投影段，不做S曲线、平滑或可行性检查
    extension_margin: 1.0              # 在最大直径基础上的延长余量(m)
    search_step: 1                   # 沿路径搜索连接点的步长(m)
    max_search_distance: 5.0          # 最大搜索距离(m)
    skip_curvature_rate_check: true    # 跳过曲率率检查
    relaxed_curvature_check: true      # 使用宽松的曲率检查
    skip_alignment_check: false        # 严格检查通道段垂直方向和航向

  # 阿克曼曲率约束；最小半径统一读取 vehicle.min_turning_radius
  curvature:
    enforce_global: true          # 无窄通道时也修正不满足3m半径的急弯
    tolerance: 0.5                # 曲率检查相对容差（投影方法使用更宽松的容差）
    max_iterations: 1000
    relaxation: 0.35              # 每轮曲率修正强度(0-1]

  # 路径连接和全局样条平滑
  smoothing:
    path_resample_spacing: 0.2
    connection_points: 20
    global_enabled: true
    smooth_factor: 0.3
    spline_smoothing: 0.1

  # 交互选择和窄通道优化前后轨迹对比样式
  visualization:
    yaw_line_length: 4.0
    unoptimized_line_width: 1.8
    optimized_line_width: 2.5

# ----------------------------------------------------------------------------
# 局部规划器选择：可选值：dwa、teb、adaptive_teb_dwa
# ----------------------------------------------------------------------------
local_planner:
  type: dwa


# ----------------------------------------------------------------------------
# DWA 局部规划器配置（字段对应 local_path_planning.DWAConfig）
# ----------------------------------------------------------------------------
dwa:
  # 控制周期（秒）
  # 值越小，更新越频繁，仿真越流畅（推荐：0.05-0.10）
  dt: 0.1

  # 预测时间范围（秒）
  predict_time: 2.8

  # 前瞻距离（米）
  lookahead_distance: 3.2

  # 目标容忍距离（米）
  goal_tolerance: 0.1

  # 速度限制
  max_speed: 2.0         # 最大速度（m/s）- 提高到 2.0 加快仿真
  max_accel: 1.0         # 最大加速度（m/s²）
  max_decel: 1.0         # 最大减速度（m/s²）

  # 转向限制
  max_steer_rate_deg: 70.0  # 最大转向角速度（度/秒）

  # 采样参数
  speed_samples: 7          # 速度采样点数
  steer_samples: 19         # 转向角采样点数

  # 代价函数权重
  goal_cost_weight: 3.0
  path_cost_weight: 2.0
  heading_cost_weight: 0.8
  obstacle_cost_weight: 3.5
  speed_cost_weight: 0.45
  steering_cost_weight: 0.2
  steering_change_cost_weight: 0.5
  progress_reward_weight: 0.04

# ----------------------------------------------------------------------------
# TEB 局部规划器配置（字段对应 local_path_planning.TEBConfig）
# 将 local_planner.type 改成 teb 即可启用
# ----------------------------------------------------------------------------
teb:
  # 非线性求解器：slsqp | g2o | auto
  # Homebrew g2o 仅提供 C++ 库；未安装 TEB g2o Python 适配器时按下项回退。
  solver: g2o
  solver_fallback: true

  dt: 0.1
  max_speed: 10.0
  # 防止优化器把首段压缩为近零速度；从静止状态会受最大加速度约束逐步爬升
  min_speed: 1
  preferred_speed: 1.20
  max_accel: 1.0
  goal_tolerance: 0.5
  # 位置和航向同时满足才判定到达
  goal_yaw_tolerance_deg: 10
  # 从终点前该距离开始渐进增加航向权重（米）
  goal_yaw_blend_distance: 5.0
  # 6 m 前瞻下 10 个节点约 0.67 m/段，兼顾弯道表达与实时性
  num_samples: 10
  # g2o 数值残差每轮调用目标函数约 O(4*num_samples) 次，避免固定跑满 60 轮
  max_iterations: 30

  # 优化权重
  w_time: 1.6
  w_obstacle: 10
  w_kinematics: 16.0
  w_acceleration: 4.5
  w_omega: 14.0
  w_path: 0.6
  # 路径切向航向跟踪，真实终点姿态使用更强约束
  weight_path_yaw: 1.0
  weight_goal_yaw: 1.0
  w_velocity: 11.8
  w_steering: 20.0

  # 障碍物安全距离
  obstacle_min_dist: 1.5
  obstacle_influence_dist: 3.0

  # 诊断日志：每 log_interval 个规划周期输出一次；故障始终输出
  # 调试阶段逐周期输出失败原因；稳定后可改回 false
  debug_log: true
  log_interval: 1

  # TEB 连续轨迹硬碰撞检查
  collision_check_resolution: 0.15

  # 只有车辆前方该路径距离内的碰撞才立即停车；远处碰撞继续重规划
  collision_stop_horizon: 3.0

# ----------------------------------------------------------------------------
# 动态障碍物配置
# ----------------------------------------------------------------------------
dynamic_obstacles:
  # 是否启用动态障碍物
  enabled: false

  # 障碍物数量
  count: 3

  # 障碍物半径（米）
  radius: 0.75

  # 速度范围（m/s）
  min_speed: 0.25
  max_speed: 0.75

  # 与静态障碍物的最小间隙（米）
  static_clearance: 0.25

# ----------------------------------------------------------------------------
# 路径优化配置 (Path Shortcut Optimizer)
# ----------------------------------------------------------------------------
path_optimization:
  # 是否启用路径优化
  enabled: true

  # 随机捷径最大迭代次数
  # 值越大，优化效果越好，但耗时更长
  # 推荐范围：50-200
  max_iterations: 40

  # 最小点间距（米）
  # 小于此距离的相邻点会被删除
  # 推荐范围：0.1-0.5
  min_points_distance: 0.2

  # 是否启用共线点过滤
  enable_angle_filter: true

  # 拐角检测、曲率约束插补和速度前瞻
  curvature_smoothing:
    # 启用通道前的曲率平滑；成功通道中心段保持锁定，不做破坏性后平滑
    enabled: true

    # 阿克曼车辆允许的最大曲率 (1/m)，通常 tan(max_steer)/wheel_base
    # wheel_base=2.5m、max_steer=30° 时约为 0.231
    max_curvature: 0.23

    # 平滑路径的等弧长采样间隔（米）
    interpolation_spacing: 0.35

    # 超过该方向变化角度即识别为拐角
    corner_angle_threshold_deg: 8.0

    # 基础拐角过渡长度（米）；实际值还会受曲率和相邻线段长度约束
    corner_blend_distance: 2.0

    # 速度前瞻约束
    max_lateral_accel: 1.2
    max_speed: 2.0
    max_accel: 1.0
    max_decel: 1.0
    lookahead_distance: 5.0
    start_speed: 0.0
    end_speed: 0.0

  # 共线判定角度阈值（度）
  # 小于此角度的三点会被认为共线，中间点会被删除
  # 推荐范围：5-20 度
  angle_threshold: 15.0

  # 随机种子（用于结果可复现）
  # 设置为 null 则每次结果不同
  random_seed: 42

  # 是否打印详细优化信息
  verbose: false

  # 碰撞检测分辨率（米）
  # 检查捷径路径时的采样间隔
  collision_check_resolution: 0.2

# ----------------------------------------------------------------------------
# 随机种子
# ----------------------------------------------------------------------------
random_seed: 7
